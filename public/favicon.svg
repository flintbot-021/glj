  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1a3326"/>
  <!-- Gold accent strip clipped to rounded rect -->
  <rect y="26" width="32" height="6" fill="#c9a84c" clip-path="url(#c)"/>
  <!-- GLJ text -->
  <text
    x="16"
    y="20"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="12"
